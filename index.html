<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trinity Classical Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="school">Trinity Classical Academy</header>
    <main id="root">
      <div class="loading">Loading…</div>
    </main>
    <script>
      (function () {
        const POLL_MS = 10000;
        const root = document.getElementById("root");

        function getEventId() {
          const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
          return path || null;
        }

        function escapeHtml(s) {
          return String(s ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        async function fetchJson(url, options) {
          const r = await fetch(url, options);
          let data = null;
          try { data = await r.json(); } catch { /* ignore */ }
          if (!r.ok) {
            const err = new Error((data && data.error) || `request_failed_${r.status}`);
            err.status = r.status;
            err.data = data;
            throw err;
          }
          return data;
        }

        function bookingKey(date, time) { return `${date}|${time}`; }

        function ownStorageKey(eventId) { return `tca-signup:own:${eventId}`; }
        function loadOwn(eventId) {
          try {
            const raw = window.localStorage.getItem(ownStorageKey(eventId));
            return raw ? JSON.parse(raw) : {};
          } catch { return {}; }
        }
        function saveOwn(eventId, own) {
          try { window.localStorage.setItem(ownStorageKey(eventId), JSON.stringify(own)); } catch {}
        }

        let state = {
          event: null,
          bookings: {}, // { "date|time": { claimed: N } }
          own: {},      // { "date|time": { bookingId, name } }
          eventId: null,
          editing: null,
          submitting: false,
          error: null,
          confirmation: null, // { date, time, bookingId, name, slotLabel, dateLabel, icsUrl }
        };

        function setState(patch) { state = { ...state, ...patch }; render(); }

        async function refreshBookings(eventId) {
          try {
            const data = await fetchJson(`/api/events/${encodeURIComponent(eventId)}/bookings`);
            return data.bookings || {};
          } catch { return state.bookings; }
        }

        function findSlot(time) {
          return (state.event && state.event.slots || []).find((s) => s.time === time);
        }
        function findDate(date) {
          return (state.event && state.event.dates || []).find((d) => d.date === date);
        }
        function slotCapacity(slot) {
          return Number.isInteger(slot.capacity) && slot.capacity >= 1 ? slot.capacity : 1;
        }

        function render() {
          if (!state.eventId) {
            root.innerHTML =
              '<div class="empty-state">No event selected.<br/><br/>Visit a specific event link to view its sign-up.</div>';
            return;
          }
          if (!state.event) {
            root.innerHTML = '<div class="loading">Loading…</div>';
            return;
          }

          const event = state.event;
          let html = `
            <section class="event-header">
              <h1 class="event-title">${escapeHtml(event.title)}</h1>
              <hr class="rule" />
              <p class="event-description">${escapeHtml(event.description || "")}</p>
              ${renderMetaRow(event)}
            </section>
          `;

          if (state.confirmation) {
            const c = state.confirmation;
            html += `
              <div class="success-banner">
                You're signed up — <strong>${escapeHtml(c.dateLabel)} at ${escapeHtml(c.slotLabel)}</strong>.
                <br/>
                <a href="${escapeHtml(c.icsUrl)}" download>Add to calendar</a>
              </div>
            `;
          }

          if (state.error) {
            html += `<div class="error-banner">${escapeHtml(state.error)}</div>`;
          }

          html += `<div class="dates-grid" style="--date-count:${event.dates.length}">`;
          for (const d of event.dates) {
            html += `<div class="date-column">
              <h2>${escapeHtml(d.label || d.date)}</h2>
              <div class="date-sub">${escapeHtml(d.date)}</div>
              <div class="slots">`;
            for (const s of event.slots) {
              html += renderSlot(d, s);
            }
            html += `</div></div>`;
          }
          html += `</div>`;

          root.innerHTML = html;
          attachHandlers();
        }

        function renderMetaRow(event) {
          const items = [];
          if (event.host) items.push(`Hosted by ${escapeHtml(event.host)}`);
          if (event.location) items.push(escapeHtml(event.location));
          if (event.slotDurationMinutes) items.push(`${event.slotDurationMinutes}-minute slots`);
          if (!items.length) return "";
          return `<div class="meta-row">${items.map((s) => `<span>${s}</span>`).join("")}</div>`;
        }

        function renderSlot(d, s) {
          const key = bookingKey(d.date, s.time);
          const claimed = (state.bookings[key] && state.bookings[key].claimed) || 0;
          const capacity = slotCapacity(s);
          const own = state.own[key];
          const isEditing = state.editing && state.editing.date === d.date && state.editing.time === s.time;
          const submitting = state.submitting && isEditing;
          const timeLabel = escapeHtml(s.label || s.time);

          if (isEditing) {
            const showEmail = !!state.event.captureEmail;
            return `
              <div class="slot editing" data-date="${escapeHtml(d.date)}" data-time="${escapeHtml(s.time)}">
                <span class="slot-time">${timeLabel}</span>
                <div class="editing-row">
                  <input type="text" placeholder="Your name" autofocus maxlength="80" data-input ${submitting ? "disabled" : ""} />
                  ${showEmail
                    ? `<input type="email" placeholder="Email (for confirmation)" maxlength="120" data-email ${submitting ? "disabled" : ""} />`
                    : ""}
                  <button class="btn confirm" data-confirm ${submitting ? "disabled" : ""}>${submitting ? "Saving…" : "Confirm"}</button>
                  <button class="btn ghost cancel" data-cancel ${submitting ? "disabled" : ""}>Cancel</button>
                </div>
              </div>`;
          }

          if (own) {
            const cta = capacity > 1
              ? `— ${escapeHtml(own.name)} (you, ${claimed}/${capacity})`
              : `— ${escapeHtml(own.name)} (you)`;
            return `
              <div class="slot claimed own">
                <span class="slot-time">${timeLabel}</span>
                <span class="slot-cta">${cta}</span>
                <button class="release" data-release data-date="${escapeHtml(d.date)}" data-time="${escapeHtml(s.time)}">Release</button>
              </div>`;
          }

          if (claimed >= capacity) {
            const text = capacity === 1 ? "Claimed" : `Full (${claimed}/${capacity})`;
            return `
              <div class="slot claimed">
                <span class="slot-time">${timeLabel}</span>
                <span class="slot-cta">${text}</span>
              </div>`;
          }

          if (capacity > 1) {
            return `
              <button class="slot partial" data-claim data-date="${escapeHtml(d.date)}" data-time="${escapeHtml(s.time)}">
                <span class="slot-time">${timeLabel}</span>
                <span class="slot-cta">${claimed}/${capacity} claimed — tap to claim</span>
              </button>`;
          }

          return `
            <button class="slot" data-claim data-date="${escapeHtml(d.date)}" data-time="${escapeHtml(s.time)}">
              <span class="slot-time">${timeLabel}</span>
              <span class="slot-cta">Tap to claim</span>
            </button>`;
        }

        function attachHandlers() {
          root.querySelectorAll("[data-claim]").forEach((el) => {
            el.addEventListener("click", () => {
              setState({
                editing: { date: el.dataset.date, time: el.dataset.time },
                error: null,
                confirmation: null,
              });
            });
          });

          root.querySelectorAll("[data-release]").forEach((el) => {
            el.addEventListener("click", () => releaseSlot(el.dataset.date, el.dataset.time));
          });

          const editingEl = root.querySelector(".slot.editing");
          if (editingEl) {
            const input = editingEl.querySelector("[data-input]");
            const emailInput = editingEl.querySelector("[data-email]");
            const confirmBtn = editingEl.querySelector("[data-confirm]");
            const cancelBtn = editingEl.querySelector("[data-cancel]");

            const submit = () => doSubmit(input, emailInput);
            confirmBtn.addEventListener("click", submit);
            cancelBtn.addEventListener("click", () => setState({ editing: null, error: null }));
            input.addEventListener("keydown", (e) => {
              if (e.key === "Enter") submit();
              if (e.key === "Escape") setState({ editing: null, error: null });
            });
            if (emailInput) {
              emailInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") submit();
                if (e.key === "Escape") setState({ editing: null, error: null });
              });
            }
            if (input && !state.submitting) input.focus();
          }
        }

        async function doSubmit(input, emailInput) {
          const name = (input.value || "").trim();
          const email = emailInput ? (emailInput.value || "").trim() : "";
          if (!name) { input.focus(); return; }
          if (state.event.captureEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            setState({ error: "Please enter a valid email." });
            if (emailInput) emailInput.focus();
            return;
          }
          const date = state.editing.date;
          const time = state.editing.time;
          setState({ submitting: true, error: null });
          try {
            const result = await fetchJson(
              `/api/events/${encodeURIComponent(state.eventId)}/book`,
              {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ date, time, name, email: email || undefined }),
              },
            );
            const k = bookingKey(date, time);
            const claimed = ((state.bookings[k] && state.bookings[k].claimed) || 0) + 1;
            const bookings = { ...state.bookings, [k]: { claimed } };
            const own = { ...state.own, [k]: { bookingId: result.bookingId, name } };
            saveOwn(state.eventId, own);
            const slot = findSlot(time);
            const dateRow = findDate(date);
            const confirmation = {
              date, time,
              bookingId: result.bookingId,
              name,
              slotLabel: (slot && slot.label) || time,
              dateLabel: (dateRow && dateRow.label) || date,
              icsUrl: result.icsUrl,
            };
            setState({ submitting: false, editing: null, bookings, own, confirmation });
          } catch (e) {
            if (e.status === 409) {
              const k = bookingKey(date, time);
              const slot = findSlot(time);
              const cap = slot ? slotCapacity(slot) : 1;
              const bookings = { ...state.bookings, [k]: { claimed: cap } };
              setState({
                submitting: false,
                editing: null,
                bookings,
                error: "That slot just filled up. Please pick another.",
              });
            } else if (e.data && e.data.error === "email_required") {
              setState({ submitting: false, error: "An email is required for this event." });
            } else if (e.data && e.data.error === "invalid_email") {
              setState({ submitting: false, error: "That email doesn't look right — please double-check." });
            } else {
              setState({ submitting: false, error: "Couldn't save your reservation. Please try again." });
            }
          }
        }

        async function releaseSlot(date, time) {
          const k = bookingKey(date, time);
          const own = state.own[k];
          if (!own) return;
          if (!window.confirm("Release this slot? You can claim a different one if you change your mind.")) return;
          try {
            await fetchJson(`/api/events/${encodeURIComponent(state.eventId)}/unbook`, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ date, time, bookingId: own.bookingId }),
            });
            const newOwn = { ...state.own };
            delete newOwn[k];
            saveOwn(state.eventId, newOwn);
            const claimed = Math.max(0, ((state.bookings[k] && state.bookings[k].claimed) || 1) - 1);
            const bookings = { ...state.bookings };
            if (claimed === 0) delete bookings[k];
            else bookings[k] = { claimed };
            setState({
              own: newOwn,
              bookings,
              confirmation: null,
              error: null,
            });
          } catch {
            setState({ error: "Couldn't release that slot. Please try again." });
          }
        }

        async function init() {
          const eventId = getEventId();
          if (!eventId) { setState({ eventId: null }); return; }
          setState({ eventId });

          try {
            const event = await fetchJson(`/api/events/${encodeURIComponent(eventId)}`);
            const bookings = await refreshBookings(eventId);
            const own = loadOwn(eventId);
            setState({ event, bookings, own });
          } catch (e) {
            if (e.status === 404) {
              root.innerHTML = `<div class="empty-state">No event found at <code>/${escapeHtml(eventId)}</code>.</div>`;
            } else {
              root.innerHTML = `<div class="empty-state">Couldn't load this event. Please refresh.</div>`;
            }
            return;
          }

          setInterval(async () => {
            if (!state.eventId || state.submitting) return;
            const polled = await refreshBookings(state.eventId);
            // Merge: keep locally-known counts at least as high as polled
            // (KV is eventually consistent — your own write may not be
            // visible to a different edge for up to ~60s).
            const merged = { ...polled };
            for (const [k, v] of Object.entries(state.bookings)) {
              const pCount = (merged[k] && merged[k].claimed) || 0;
              const lCount = (v && v.claimed) || 0;
              if (lCount > pCount) merged[k] = { claimed: lCount };
            }
            setState({ bookings: merged });
          }, POLL_MS);
        }

        init();
      })();
    </script>
  </body>
</html>
